name: Mirror to Personal GitHub

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push mirror to personal GitHub
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${PERSONAL_TOKEN}@github.com" > ~/.git-credentials
          git remote add personal https://github.com/danielthornton06/slakeeper-website-deploy.git
          git push personal --mirror
